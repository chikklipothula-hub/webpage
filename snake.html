<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Snake & Ladder: Bot Edition</title>
    <link rel="stylesheet" href="snake.css">
</head>
<body>
    <div class="lobby-container" id="lobby">
        <div class="header-bar">
            <h1>ELITE SNAKE & LADDER</h1>
            <div class="wallet-display">Deposit: ₹<span id="wallet-balance"></span></div>
        </div>
        
        <div class="rooms-grid">
            <div class="room-card" onclick="enterRoom(10, 18, 'classic')">
                <div class="room-title">Classic Room</div>
                <div class="price">Entry: ₹10</div>
                <div class="win">Win: ₹18</div>
            </div>
            <div class="room-card" onclick="enterRoom(100, 80, 'pink')">
                <div class="room-title">Pink Palace</div>
                <div class="price">Entry: ₹100</div>
                <div class="win">Win: ₹80</div>
            </div>
            <div class="room-card" onclick="enterRoom(250, 280, 'blue')">
                <div class="room-title">Ocean Checker</div>
                <div class="price">Entry: ₹250</div>
                <div class="win">Win: ₹280</div>
            </div>
            <div class="room-card" onclick="enterRoom(500, 400, 'jungle')">
                <div class="room-title">Jungle Safari</div>
                <div class="price">Entry: ₹500</div>
                <div class="win">Win: ₹400</div>
            </div>
        </div>
    </div>

    <div class="game-wrapper" id="game-area" style="display:none;">
        <div class="game-stats">
            <button class="back-btn" onclick="exitToLobby()">⬅ Quit</button>
            <div id="active-room-info" style="font-weight: bold; color: gold;"></div>
            <div class="game-wallet">Wallet: ₹<span id="game-wallet-val">1000</span></div>
        </div>

        <div id="turn-banner">YOUR TURN</div>
        
        <div id="board-container">
            <canvas id="snakeCanvas" width="550" height="550"></canvas>
            <div id="snakes-grid"></div>
        </div>

        <div class="player-info-bar">
            <div class="p-box">👤 You: <span id="p1-pos">1</span></div>
            <div class="p-box">🤖 Bot: <span id="p2-pos">1</span></div>
        </div>

        <div class="dice-section">
            <div id="dice-result" class="dice-animation">⚀</div>
            <button id="roll-btn" onclick="handleDiceRoll()">Roll Dice</button>
        </div>
    </div>

    <script src="snake.js"></script>
</body>
</html>
