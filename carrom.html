<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrom Elite Pro</title>
    <link rel="stylesheet" href="carrom.css">
</head>
<body>
    <div class="glass-container">
        <h1 class="game-title">CARROM ELITE PRO</h1>

        <div class="pool-levels" id="room-selection">
            <div class="pool-card" onclick="openPayment(10, 18)">₹10 <span>Win ₹18</span></div>
            <div class="pool-card" onclick="openPayment(50, 40)">₹50 <span>Win ₹40</span></div>
            <div class="pool-card" onclick="openPayment(100, 80)">₹100 <span>Win ₹80</span></div>
            <div class="pool-card" onclick="openPayment(250, 200)">₹250 <span>Win ₹200</span></div>
            <div class="pool-card" onclick="openPayment(500, 400)">₹500 <span>Win ₹400</span></div>
        </div>

        <div class="top-wallet-bar">
            <div class="wallet-item">Wallet: <span id="wallet">₹</span></div>
            <div class="wallet-item">Turn: <span id="turn-status" style="color:gold">Select a Room</span></div>
            <div class="wallet-item">Score: <span id="user-score">0</span> | <span id="bot-score">0</span></div>
            <div id="pool-win-container" style="display:none;">Win: <span id="current-win">₹0</span></div>
        </div>

        <div class="game-main">
            <div class="board-frame">
                <canvas id="carromBoard" width="500" height="500"></canvas>
            </div>

            <div class="controls">
                <p style="color:white; margin-bottom:5px; font-size: 0.9rem;">Position Striker:</p>
                <input type="range" id="striker-slider" min="100" max="400" value="250" style="width: 80%;">
                
                <div style="margin-top:15px;">
                    <button class="primary-btn" id="hit-btn" onclick="fireStriker()" style="padding:12px 40px; font-weight:bold; background:gold; border:none; border-radius:5px; cursor:pointer; color: black;">HIT STRIKER</button>
                    <button class="secondary-btn" onclick="location.reload()" style="padding:12px 20px; border-radius:5px; margin-left: 10px;">Reset Game</button>
                </div>
            </div>
        </div>

        <div class="player-section-footer">
            <div class="player-box">
                <span class="avatar">👤</span>
                <p>YOU (<span id="user-color-name">?</span>)</p>
            </div>
            <div class="vs-divider">VS</div>
            <div class="player-box">
                <span class="avatar">🤖</span>
                <p>BOT (<span id="bot-color-name">?</span>)</p>
            </div>
        </div>
    </div>

    <div id="colorModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:white;">
        <h2 style="font-size: 2rem; margin-bottom: 20px;">Choose Your Side</h2>
        <p style="margin-bottom: 30px; color: #ccc;">White coins give more points!</p>
        <div style="display: flex; gap: 20px;">
            <button onclick="startGameWithColor('#ffffff')" style="padding:20px 40px; font-size: 1.1rem; cursor:pointer; border-radius: 10px; border: 2px solid white; background: transparent; color: white;">WHITE (20 Pts)</button>
            <button onclick="startGameWithColor('#333333')" style="padding:20px 40px; font-size: 1.1rem; cursor:pointer; border-radius: 10px; border: 2px solid #333; background: #333; color: white;">BLACK (10 Pts)</button>
        </div>
    </div>

    <script src="carrom.js"></script>
</body>
</html>
