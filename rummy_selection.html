<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool Rummy Selection</title>
    <link rel="stylesheet" href="rummy_selection.css">
</head>
<body class="bg-overlay">
    <div class="selection-modal">
        <div class="modal-header">
            <h3>Practice</h3>
            <span class="close-btn">&times;</span>
        </div>

        <div class="game-type-tabs">
            <button class="tab">Points</button>
            <button class="tab active">Pool</button>
            <button class="tab">Deals</button>
        </div>

        <div class="player-toggle">
            <label class="radio-label">
                <input type="radio" name="players" value="2" checked onchange="loadPoolData(2)">
                <span class="custom-radio"></span> 2 Players
            </label>
            <label class="radio-label">
                <input type="radio" name="players" value="6" onchange="loadPoolData(6)">
                <span class="custom-radio"></span> 6 Players
            </label>
        </div>

        <div class="data-table">
            <div class="table-head">
        
            </div>
            <div id="poolEntries" class="table-content">
                </div>
        </div>

        <button class="practice-now-btn" onclick="launchGame()">PRACTICE NOW</button>
    </div>
    <script src="rummy_logic.js"></script>
</body>
</html>
